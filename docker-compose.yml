services:
  backend:
    build:
      context: ./backend
    container_name: shoplite-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
     
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost}

  frontend:
    build:
      context: ./frontend
      args:
    
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    container_name: shoplite-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
